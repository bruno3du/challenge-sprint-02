<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="tela.css">
</head>
<body class="register-page">
  <main class="register-shell">
    <section class="register-card" aria-labelledby="register-title">
      <h1 id="register-title">Registro</h1>

      <form class="register-form needs-validation" id="register-form" novalidate>
        <div class="register-grid">
          <div class="field">
            <label for="first-name">Primeiro nome</label>
            <input id="first-name" class="form-control" name="firstName" type="text" autocomplete="given-name">
            <small class="field-error"></small>
          </div>

          <div class="field">
            <label for="second-name">Segundo nome</label>
            <input id="second-name" class="form-control" name="lastName" type="text" autocomplete="family-name">
            <small class="field-error"></small>
          </div>

          <div class="field">
            <label for="register-email">Email</label>
            <input id="register-email" class="form-control" name="email" type="email" autocomplete="email">
            <small class="field-error"></small>
          </div>

          <div class="field">
            <label for="cpf">CPF</label>
            <input id="cpf" class="form-control" name="cpf" type="text" inputmode="numeric" maxlength="14">
            <small class="field-error"></small>
          </div>

          <div class="field field-wide">
            <label for="address">Endere&ccedil;o</label>
            <input id="address" class="form-control" name="address" type="text" autocomplete="street-address">
            <small class="field-error"></small>
          </div>

          <div class="field">
            <label for="create-password">Crie uma senha</label>
            <input id="create-password" class="form-control" name="password" type="password" autocomplete="new-password">
            <small class="field-error"></small>
          </div>

          <div class="field">
            <label for="repeat-password">Repetir Senha</label>
            <input id="repeat-password" class="form-control" name="repeatPassword" type="password" autocomplete="new-password">
            <small class="field-error"></small>
          </div>

          <div class="field field-wide">
            <label for="plan">Plano</label>
            <select id="plan" class="form-select" name="plan" aria-label="Plano">
              <option value=""></option>
              <option value="basic">B&aacute;sico</option>
              <option value="premium">Premium</option>
            </select>
            <small class="field-error"></small>
          </div>
        </div>

        <button class="register-button btn btn-primary" type="submit">Registrar</button>
        <p class="form-message" role="status" aria-live="polite"></p>
      </form>

      <p class="login-link">J&aacute; possui conta? <a href="tela_login.html">Fazer login</a></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="script.js"></script>
</body>
</html>
